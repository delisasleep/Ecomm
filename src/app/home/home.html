<div class="banner">

</div>
<div class="productsContainer row m-3">

    @for(product of products; track product.pPrice){
    <div class="col-lg-3 col-md-4 col-sm-6">
        <div class="products">
            <img [src]="product.pImage" class="pImage">
            <h3 class="pTitle" >{{ product.pTitle }}</h3>
            <p class="pDescription">
                {{ product.pDescription }}
            </p>
            <div class="price">${{ product.pPrice }}</div>
        </div>
    </div>
    }


</div>
